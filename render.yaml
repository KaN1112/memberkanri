services:
  - type: worker
    name: discord-x-member-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /var/data
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: RECORD_CHANNEL_ID
        sync: false
      - key: MEMBERS_CHANNEL_ID
        sync: false
      - key: MEMBERS_MESSAGE_ID
        sync: false
    disk:
      name: member-data
      mountPath: /var/data
      sizeGB: 1
